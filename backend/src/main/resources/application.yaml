spring:
  application:
    name: backend
  datasource:
    url: jdbc:h2:file:/.data/db
    driverClassName: org.h2.Driver
    username: sa
    password:
  h2:
    console:
      enabled: true
      path: /h2-console
  batch:
    job:
      enabled: false
    jdbc:
        initialize-schema: ALWAYS
  sql:
    init:
      mode: always
file:
  upload:
    dir: ./temp
